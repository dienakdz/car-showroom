services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: car_app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: car_nginx
    ports:
      - "8888:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: car_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: car_showroom
      MYSQL_USER: car
      MYSQL_PASSWORD: car
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: