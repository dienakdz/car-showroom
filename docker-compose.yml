services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: car_app
    user: "0:0"
    working_dir: /var/www/html
    command: >
      sh -lc "mkdir -p storage/framework/views storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache && chown -R www:www storage/framework bootstrap/cache && chmod -R ug+rwX storage/framework bootstrap/cache && if [ ! -f vendor/autoload.php ] || [ composer.lock -nt vendor/autoload.php ]; then composer install --no-interaction --prefer-dist; fi && if [ -f .env ]; then php artisan config:cache --ansi; fi && php-fpm"
    volumes:
      - ./src:/var/www/html
      - vendor_data:/var/www/html/vendor
      - framework_data:/var/www/html/storage/framework
      - bootstrap_cache_data:/var/www/html/bootstrap/cache
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: car_nginx
    ports:
      - "8888:80"
    volumes:
      - ./src/public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: car_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: car_showroom
      MYSQL_USER: car
      MYSQL_PASSWORD: car
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  vendor_data:
  framework_data:
  bootstrap_cache_data:
